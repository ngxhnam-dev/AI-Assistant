services:
  agent:
    build:
      context: .
      dockerfile: agent.dockerfile
    entrypoint: ["python", "agent.py", "start"]
    restart: always
    environment:
      - BITHUMAN_API_SECRET=${BITHUMAN_API_SECRET}
      - BITHUMAN_AGENT_ID=${BITHUMAN_AGENT_ID}
      - RAG_API_KEY=${RAG_API_KEY}
      - RAG_URL=${RAG_URL:-https://hub.advietnam.vn/v1/chat-messages}
      - RAG_USER_PREFIX=${RAG_USER_PREFIX:-bithuman}
      - LIVEKIT_URL=${LIVEKIT_URL}
      - LIVEKIT_API_KEY=${LIVEKIT_API_KEY}
      - LIVEKIT_API_SECRET=${LIVEKIT_API_SECRET}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - ELEVENLABS_API_KEY=${ELEVENLABS_API_KEY}
      - ELEVENLABS_VOICE_ID=${ELEVENLABS_VOICE_ID}
      - ELEVENLABS_MODEL_ID=${ELEVENLABS_MODEL_ID:-eleven_flash_v2_5}
      - ELEVENLABS_LANGUAGE_CODE=${ELEVENLABS_LANGUAGE_CODE:-vi}
      - ELEVENLABS_OUTPUT_FORMAT=${ELEVENLABS_OUTPUT_FORMAT:-pcm_16000}
    volumes:
      - ./agent.py:/app/agent.py
    networks:
      - bh-network

  frontend:
    build:
      context: ./nextjs-ui
      dockerfile: Dockerfile
    restart: always
    ports:
      - "4202:4202"
    environment:
      - BITHUMAN_API_SECRET=${BITHUMAN_API_SECRET}
      - BITHUMAN_AGENT_ID=${BITHUMAN_AGENT_ID}
      - BITHUMAN_API_URL=${BITHUMAN_API_URL:-https://api.bithuman.ai}
      - LIVEKIT_API_KEY=${LIVEKIT_API_KEY}
      - LIVEKIT_API_SECRET=${LIVEKIT_API_SECRET}
      - LIVEKIT_API_URL=${LIVEKIT_API_URL}
      - LIVEKIT_WS_URL=${LIVEKIT_WS_URL}
      - LIVEKIT_AGENT_NAME=${LIVEKIT_AGENT_NAME}
      - NEXT_PUBLIC_LIVEKIT_URL=${NEXT_PUBLIC_LIVEKIT_URL}
      - NEXT_PUBLIC_APP_CONFIG=${NEXT_PUBLIC_APP_CONFIG:-}
      - BITHUMAN_AVATAR_IMAGE=${BITHUMAN_AVATAR_IMAGE:-}
      - PORT=4202
    networks:
      - bh-network

networks:
  bh-network:
    driver: bridge
